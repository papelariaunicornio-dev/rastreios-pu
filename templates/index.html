<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreamento de Pedidos — Papelaria Unicórnio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Assistant', sans-serif;
      background: #f7f5fb;
      color: #2d2d2d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────── */
    header {
      background: linear-gradient(135deg, #623DA6 0%, #7b52c0 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 16px rgba(98,61,166,0.3);
    }
    header img { height: 38px; object-fit: contain; flex-shrink: 0; }
    header h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    /* ── Main ─────────────────────────────── */
    main {
      flex: 1;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Search card ──────────────────────── */
    .search-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .search-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #623DA6;
      margin-bottom: 6px;
    }
    .search-card p {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      max-width: 400px;
      margin: 0 auto;
    }
    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 14px 16px;
      border: 2px solid #e0d8f0;
      border-radius: 14px;
      font-family: 'Assistant', sans-serif;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #623DA6; }
    .input-row input::placeholder { color: #bbb; }
    .btn-buscar {
      padding: 14px 22px;
      background: #623DA6;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Assistant', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-buscar:hover  { background: #7b52c0; }
    .btn-buscar:active { transform: scale(0.97); }
    .btn-buscar:disabled { background: #b0a0d0; cursor: not-allowed; }

    /* ── Messages ─────────────────────────── */
    .msg {
      margin-top: 16px;
      padding: 11px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      text-align: center;
    }
    .msg-error   { background: #fdecea; color: #c0392b; }
    .msg-empty   { background: #f0f0f0; color: #666; }
    .msg-loading { background: #f0ebff; color: #623DA6; }
    .hidden { display: none; }

    /* ── Results ──────────────────────────── */
    #results { margin-top: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Cards ────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #623DA6;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── Assinatura grid ──────────────────── */
    .assina-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 12px;
    }
    .assina-item label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }
    .assina-item .value {
      font-size: 0.92rem;
      font-weight: 600;
      color: #2d2d2d;
    }

    /* ── Badges ───────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .badge-active   { background: #e6f9ef; color: #1a7a3e; }
    .badge-trialing { background: #fff8e0; color: #b07a00; }
    .badge-canceled { background: #fdecea; color: #c0392b; }
    .badge-inactive { background: #f0f0f0; color: #777; }

    /* ── Order cards ──────────────────────── */
    .cutoff-note {
      font-size: 0.8rem;
      color: #aaa;
      margin: -6px 0 14px;
    }
    .order-list { display: flex; flex-direction: column; gap: 10px; }
    .order-item {
      border: 1.5px solid #f0e8ff;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .order-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .order-num {
      font-weight: 700;
      color: #623DA6;
      font-size: 0.95rem;
    }
    .order-date {
      font-size: 0.82rem;
      color: #888;
    }
    .order-transport {
      font-size: 0.85rem;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .transport-badge {
      background: #f0ebff;
      color: #623DA6;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .rastreio-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #623DA6;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 7px 14px;
      border-radius: 10px;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .rastreio-btn:hover { background: #7b52c0; }
    .no-rastreio { font-size: 0.82rem; color: #bbb; }

    /* ── Footer ───────────────────────────── */
    footer {
      background: #623DA6;
      color: rgba(255,255,255,0.9);
      text-align: center;
      padding: 24px 16px;
      font-size: 0.88rem;
      line-height: 1.8;
    }
    footer a { color: #e8d9ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px 16px;
      margin-top: 4px;
    }

    /* ── Mobile tweaks ────────────────────── */
    @media (max-width: 480px) {
      header { padding: 14px 16px; gap: 12px; }
      header img { height: 32px; }
      header h1 { font-size: 0.98rem; }
      main { padding: 18px 12px 40px; }
      .search-card { padding: 22px 16px; }
      .input-row { flex-direction: column; }
      .btn-buscar { width: 100%; padding: 15px; font-size: 1.05rem; }
      .assina-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <img src="https://papelariaunicornio.com.br/cdn/shop/files/logo.png?v=1703102166" alt="Papelaria Unicórnio" />
  <h1>Rastreamento de Pedidos</h1>
</header>

<main>
  <div class="search-card">
    <h2>Consulte seus pedidos</h2>
    <p>Informe seu CPF para ver o status dos envios e sua assinatura.</p>
    <div class="input-row">
      <input
        type="text"
        id="cpf-input"
        placeholder="000.000.000-00"
        maxlength="14"
        inputmode="numeric"
        autocomplete="off"
      />
      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">Buscar</button>
    </div>
    <div id="msg" class="msg hidden"></div>
  </div>

  <div id="results"></div>
</main>

<footer>
  <strong>Papelaria Unicórnio</strong>
  <div class="footer-links">
    <a href="https://wa.me/5527999551978">WhatsApp (27) 99955-1978</a>
    <a href="mailto:atendimento@papelariaunicornio.com.br">atendimento@papelariaunicornio.com.br</a>
  </div>
</footer>

<script>
  const cpfInput = document.getElementById('cpf-input');

  cpfInput.addEventListener('input', () => {
    let v = cpfInput.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
    cpfInput.value = v;
  });

  cpfInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });

  const urlCpf = new URLSearchParams(window.location.search).get('cpf');
  if (urlCpf) {
    const digits = urlCpf.replace(/\D/g, '').slice(0, 11);
    if (digits.length === 11) {
      cpfInput.value = digits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      buscar();
    }
  }

  function cpfValido(digits) {
    if (digits.length !== 11 || /^(\d)\1{10}$/.test(digits)) return false;
    let sum = 0;
    for (let i = 0; i < 9; i++) sum += +digits[i] * (10 - i);
    let r = (sum * 10) % 11;
    if (r === 10 || r === 11) r = 0;
    if (r !== +digits[9]) return false;
    sum = 0;
    for (let i = 0; i < 10; i++) sum += +digits[i] * (11 - i);
    r = (sum * 10) % 11;
    if (r === 10 || r === 11) r = 0;
    return r === +digits[10];
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = `msg msg-${type}`;
  }

  function hideMsg() {
    document.getElementById('msg').className = 'msg hidden';
  }

  function fmtDate(str) {
    if (!str) return '—';
    const d = str.slice(0, 10).split('-');
    return `${d[2]}/${d[1]}/${d[0]}`;
  }

  function statusBadge(status) {
    const map = {
      active:   ['badge-active',   'Ativa'],
      trialing: ['badge-trialing', 'Período de teste'],
      canceled: ['badge-canceled', 'Cancelada'],
      inactive: ['badge-inactive', 'Inativa'],
    };
    const [cls, label] = map[status] || ['badge-inactive', status || '—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function renderAssinatura(assina, venda) {
    if (!assina && !venda) return '';
    const plano   = venda?.oferta_nome || '—';
    const status  = assina?.last_status || '—';
    const proxPag = fmtDate(assina?.next_cycle_at);
    const ultPag  = fmtDate(venda?.confirmed_at);
    return `
      <div class="card">
        <div class="card-title">⭐ Minha Assinatura</div>
        <div class="assina-grid">
          <div class="assina-item">
            <label>Plano</label>
            <div class="value">${plano}</div>
          </div>
          <div class="assina-item">
            <label>Status</label>
            <div class="value">${statusBadge(status)}</div>
          </div>
          <div class="assina-item">
            <label>Último pagamento</label>
            <div class="value">${ultPag}</div>
          </div>
          <div class="assina-item">
            <label>Próximo pagamento</label>
            <div class="value">${proxPag}</div>
          </div>
        </div>
      </div>`;
  }

  function renderPedidos(pedidos, cutoff) {
    if (!pedidos.length) return '';
    const items = pedidos.map(p => {
      const num        = p.id_venda_tiny || p.Id || '—';
      const dataPedido = fmtDate(p.data_pedido);
      const dataEnvio  = fmtDate(p.dt_postagem || p.CreatedAt);
      const envio      = p.forma_envio ? `<span class="transport-badge">${p.forma_envio}</span>` : '';
      const frete      = p.forma_frete ? `<span class="transport-badge">${p.forma_frete}</span>` : '';
      const transLine  = (envio || frete)
        ? `<div class="order-transport">${envio}${frete}</div>`
        : '';
      const isFM = (p.forma_envio || '').toLowerCase().includes('fm');
      const rastreio = p.codigo_rastreio
        ? `<a class="rastreio-btn" href="${p.url_rastreio || '#'}" target="_blank" rel="noopener">
             🔍 ${p.codigo_rastreio}
           </a>`
        : isFM
          ? `<a class="rastreio-btn" href="https://rastreio.fmtransportes.com.br/" target="_blank" rel="noopener">
               🔍 Rastrear FM Transportes
             </a>`
          : `<span class="no-rastreio">Sem código de rastreio</span>`;
      return `
        <div class="order-item">
          <div class="order-top">
            <span class="order-num">Pedido #${num}</span>
            <span class="order-date">Pedido: ${dataPedido} · Envio: ${dataEnvio}</span>
          </div>
          ${transLine}
          ${rastreio}
        </div>`;
    }).join('');

    return `
      <div class="card">
        <div class="card-title">📦 Pedidos enviados</div>
        <p class="cutoff-note">Exibindo pedidos a partir de ${cutoff}</p>
        <div class="order-list">${items}</div>
      </div>`;
  }

  async function buscar() {
    const cpf    = cpfInput.value.trim();
    const digits = cpf.replace(/\D/g, '');
    if (!cpfValido(digits)) {
      showMsg('CPF inválido. Verifique os números e tente novamente.', 'error');
      return;
    }

    const btn = document.getElementById('btn-buscar');
    btn.disabled = true;
    showMsg('Buscando...', 'loading');
    document.getElementById('results').innerHTML = '';

    try {
      const resp = await fetch('/api/buscar', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ cpf }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        showMsg(data.erro || 'Erro ao buscar. Tente novamente.', 'error');
        return;
      }

      hideMsg();
      const { pedidos, assinatura, ultima_venda, cutoff_br } = data;

      if (!pedidos.length && !assinatura && !ultima_venda) {
        showMsg('Nenhum pedido ou assinatura encontrado para este CPF.', 'empty');
        return;
      }

      document.getElementById('results').innerHTML =
        renderAssinatura(assinatura, ultima_venda) +
        renderPedidos(pedidos, cutoff_br);

    } catch (e) {
      showMsg('Erro de conexão. Tente novamente.', 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
